<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎂 Chúc Mừng Sinh Nhật 🎂</title>
    <!-- Font Awesome cho icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Canvas Confetti cho pháo hoa -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Canvas cho bóng bay nổi */
        #balloonCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Container chính */
        .birthday-card {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Tiêu đề */
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff4da6;
            background: linear-gradient(45deg, #ffd700, #ff6ec7, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .subtitle i {
            color: #ffd700;
        }

        /* Ảnh bánh kem */
        .cake-container {
            margin: 15px 0 20px;
            position: relative;
        }

        .cake {
            font-size: 8rem;
            line-height: 1;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            animation: cakeBounce 2s infinite alternate;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cake:hover {
            transform: scale(1.05);
        }

        @keyframes cakeBounce {
            from { transform: rotate(-3deg) scale(1); }
            to { transform: rotate(3deg) scale(1.02); }
        }

        /* Nến */
        .candles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 25px;
        }

        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 10px rgba(255, 200, 0, 0.6));
            cursor: pointer;
            transition: transform 0.2s;
        }

        .candle:hover {
            transform: scale(1.1);
        }

        .flame {
            font-size: 2.8rem;
            line-height: 1;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); text-shadow: 0 0 5px orange; }
            100% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 15px #ffaa00, 0 0 25px #ff5500; }
        }

        .candle-body {
            font-size: 2.5rem;
            margin-top: -8px;
        }

        .candle.blown .flame {
            opacity: 0;
            animation: none;
            text-shadow: none;
        }

        .candle.blown .candle-body i {
            color: #aaa;
        }

        /* Lời chúc */
        .message {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 18px 25px;
            margin: 20px 0 25px;
            border-left: 5px solid #ffd700;
            font-size: 1.3rem;
            font-weight: 500;
            backdrop-filter: blur(5px);
            line-height: 1.6;
        }

        .message i {
            color: #ff6ec7;
            margin: 0 5px;
        }

        /* Nút bấm */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 5px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 215, 0, 0.6);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex: 1 0 140px;
            justify-content: center;
        }

        .btn i {
            font-size: 1.3rem;
        }

        .btn:hover {
            background: rgba(255, 215, 0, 0.25);
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        .btn:active {
            transform: translateY(2px);
        }

        /* Music control */
        .music-toggle {
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 500px) {
            h1 { font-size: 2.5rem; }
            .cake { font-size: 6rem; }
            .btn { padding: 12px 16px; font-size: 1rem; }
            .message { font-size: 1.1rem; }
        }

        /* Ẩn audio controls */
        audio { display: none; }
    </style>
</head>
<body>

    <!-- Canvas cho bóng bay -->
    <canvas id="balloonCanvas"></canvas>

    <!-- Nhạc nền -->
    <audio id="birthdaySong" loop>
        <source src="https://litter.catbox.moe/t1psqhn97w9a5kxy.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ audio.
    </audio>

    <!-- Card chính -->
    <div class="birthday-card">
        <h1>
            <i class="fas fa-birthday-cake"></i> 
            HAPPY BIRTHDAY 
            <i class="fas fa-gift"></i>
        </h1>
        <div class="subtitle">
            <i class="fas fa-star"></i> Gửi đến người đặc biệt nhất <i class="fas fa-star"></i>
        </div>

        <!-- Bánh kem và nến -->
        <div class="cake-container">
            <div class="cake" id="cakeEmoji" onclick="lightCandles()">
                🎂
            </div>
        </div>

        <!-- Nến (3 cây) -->
        <div class="candles" id="candleSet">
            <div class="candle" id="candle1" onclick="blowCandle(1)">
                <div class="flame" id="flame1">🔥</div>
                <div class="candle-body"><i class="fas fa-candle" style="color: #ff9999;"></i></div>
            </div>
            <div class="candle" id="candle2" onclick="blowCandle(2)">
                <div class="flame" id="flame2">🔥</div>
                <div class="candle-body"><i class="fas fa-candle" style="color: #99ccff;"></i></div>
            </div>
            <div class="candle" id="candle3" onclick="blowCandle(3)">
                <div class="flame" id="flame3">🔥</div>
                <div class="candle-body"><i class="fas fa-candle" style="color: #99ff99;"></i></div>
            </div>
        </div>

        <!-- Lời chúc -->
        <div class="message">
            <i class="fas fa-quote-left"></i> 
            Chúc mừng sinh nhật! Chúc bạn tuổi mới thật nhiều niềm vui, 
            sức khỏe dồi dào và luôn rạng rỡ như những ngọn nến lung linh này. 
            Cảm ơn vì đã có mặt trên đời! 
            <i class="fas fa-quote-right"></i>
        </div>

        <!-- Các nút chức năng -->
        <div class="button-group">
            <button class="btn" onclick="fireConfetti()">
                <i class="fas fa-fire"></i> Pháo hoa
            </button>
            <button class="btn" onclick="fireConfetti('hearts')">
                <i class="fas fa-heart"></i> Tim bay
            </button>
            <button class="btn" onclick="fireConfetti('stars')">
                <i class="fas fa-star"></i> Sao băng
            </button>
        </div>
        <div class="button-group">
            <button class="btn" onclick="addBalloons(5)">
                <i class="fas fa-balloon"></i> Thêm bóng bay
            </button>
            <button class="btn" onclick="resetAll()">
                <i class="fas fa-redo-alt"></i> Thắp lại nến
            </button>
        </div>

        <!-- Điều khiển nhạc -->
        <div class="music-toggle" onclick="toggleMusic()">
            <i class="fas fa-music" id="musicIcon"></i>
            <span id="musicText">Bật nhạc sinh nhật</span>
        </div>

        <div class="footer">
            ✨ Chạm vào nến để thổi, chạm bánh để thắp lại ✨
        </div>
    </div>

    <script>
        (function(){
            // ========== CẤU HÌNH BÓNG BAY ==========
            const canvas = document.getElementById('balloonCanvas');
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            let balloons = [];
            const BALLOON_COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#BF8CF7', '#FF66B2', '#6EE7B7'];
            
            class Balloon {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 25 + Math.random() * 20;
                    this.color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
                    this.speed = 0.5 + Math.random() * 1.2;
                    this.wind = (Math.random() - 0.5) * 0.4;
                    this.stringLength = 40 + Math.random() * 30;
                    this.opacity = 0.9;
                }
                
                update() {
                    this.y -= this.speed;
                    this.x += this.wind;
                    return this.y + this.radius + this.stringLength > 0;
                }
                
                draw(ctx) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.radius);
                    ctx.lineTo(this.x - 3 + Math.sin(Date.now()/200 + this.x)*2, this.y + this.radius + this.stringLength);
                    ctx.strokeStyle = '#8B7D6B';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.radius, this.radius*1.15, 0, 0, Math.PI*2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(255,255,255,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    ctx.beginPath();
                    ctx.arc(this.x - this.radius*0.2, this.y - this.radius*0.2, this.radius*0.2, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y + this.radius-2, 6, 4, 0, 0, Math.PI*2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 1;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function addBalloons(count = 3) {
                for(let i=0; i<count; i++) {
                    balloons.push(new Balloon(
                        Math.random() * width * 0.8 + width*0.1,
                        height + 50 + Math.random() * 100
                    ));
                }
            }

            function animateBalloons() {
                ctx.clearRect(0, 0, width, height);
                balloons = balloons.filter(balloon => {
                    const keep = balloon.update();
                    if(keep) balloon.draw(ctx);
                    return keep;
                });
                requestAnimationFrame(animateBalloons);
            }
            
            for(let i=0; i<8; i++) {
                setTimeout(() => addBalloons(1), i*200);
            }
            animateBalloons();

            // ========== PHÁO HOA (Confetti) ==========
            function fireConfetti(type = 'default') {
                if(type === 'hearts') {
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, shapes: ['circle'], colors: ['#ff4d6d', '#ff85a1', '#ffb3c6'], scalar: 1.2 });
                    setTimeout(() => confetti({ particleCount: 100, spread: 80, origin: { y: 0.6, x: 0.3 }, shapes: ['circle'], colors: ['#ff4d6d'] }), 150);
                    setTimeout(() => confetti({ particleCount: 100, spread: 80, origin: { y: 0.6, x: 0.7 }, shapes: ['circle'], colors: ['#ff85a1'] }), 300);
                } else if(type === 'stars') {
                    confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, colors: ['#FFD700', '#FFA500', '#FFDF00', '#FFF8DC'] });
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.5, x: 0.2 }, colors: ['#FFD700'] });
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.5, x: 0.8 }, colors: ['#FFA500'] });
                } else {
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                    confetti({ particleCount: 150, spread: 120, origin: { y: 0.5, x: 0.3 }, colors: ['#26ccff', '#a25afd', '#ff5e7d'] });
                    confetti({ particleCount: 150, spread: 120, origin: { y: 0.5, x: 0.7 }, colors: ['#ffcd56', '#ff6384', '#36a2eb'] });
                    setTimeout(() => confetti({ particleCount: 300, spread: 150, origin: { y: 0.4 } }), 200);
                }
            }

            // ========== NẾN & BÁNH ==========
            function blowCandle(id) {
                const candle = document.getElementById(`candle${id}`);
                if(!candle.classList.contains('blown')) {
                    candle.classList.add('blown');
                    confetti({ particleCount: 30, spread: 45, origin: { x: 0.3 + id*0.2, y: 0.55 } });
                }
                checkAllBlown();
            }

            function lightCandles() {
                for(let i=1; i<=3; i++) {
                    document.getElementById(`candle${i}`).classList.remove('blown');
                }
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });
            }

            function checkAllBlown() {
                const allBlown = [1,2,3].every(i => document.getElementById(`candle${i}`).classList.contains('blown'));
                if(allBlown) {
                    setTimeout(() => {
                        fireConfetti('default');
                        fireConfetti('hearts');
                        fireConfetti('stars');
                        addBalloons(8);
                    }, 200);
                }
            }

            function resetAll() {
                lightCandles();
                fireConfetti('stars');
            }

            // ========== NHẠC ==========
            const audio = document.getElementById('birthdaySong');
            let musicPlaying = false;
            
            function toggleMusic() {
                const icon = document.getElementById('musicIcon');
                const text = document.getElementById('musicText');
                if(musicPlaying) {
                    audio.pause();
                    icon.className = 'fas fa-music';
                    text.textContent = 'Bật nhạc sinh nhật';
                } else {
                    audio.play().catch(e => {
                        console.log('Vui lòng tương tác với trang để phát nhạc');
                        alert('👆 Hãy nhấn vào nút một lần nữa để phát nhạc nhé!');
                    });
                    icon.className = 'fas fa-pause';
                    text.textContent = 'Tạm dừng nhạc';
                }
                musicPlaying = !musicPlaying;
            }

            window.blowCandle = blowCandle;
            window.lightCandles = lightCandles;
            window.fireConfetti = fireConfetti;
            window.addBalloons = (n) => addBalloons(n || 3);
            window.resetAll = resetAll;
            window.toggleMusic = toggleMusic;

            setTimeout(() => fireConfetti('default'), 500);
        })();
    </script>
</body>
</html>
